<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Bible</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui; }
input { background-color: #111; color: white; border-radius: 12px; }
</style>
</head>

<body>
<div id="root"></div>

<script>
const { useState } = React;

function App() {

  const isAdmin = new URLSearchParams(window.location.search).get('admin') === '1';
  const [showQR, setShowQR] = useState(false);
  const [search, setSearch] = useState("");

  const cleanUrl = new URL(window.location.href);
  cleanUrl.search = "";
  cleanUrl.hash = "";
  const publicUrl = cleanUrl.toString();

  const qrImg = "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=" + encodeURIComponent(publicUrl);

  const wines = [
    { name: "Villa Maria Sauvignon Blanc", region: "Marlborough", country: "New Zealand" },
    { name: "Santa Margherita Pinot Grigio", region: "Alto Adige", country: "Italy" },
    { name: "Jean-Marc Brocard Chablis", region: "Chablis", country: "France" },
    { name: "Leyda Reserve Pinot Noir", region: "Leyda Valley", country: "Chile" },
    { name: "Antinori Tignanello", region: "Tuscany", country: "Italy" }
  ];

  const filtered = wines.filter(w =>
    w.name.toLowerCase().includes(search.toLowerCase()) ||
    w.region.toLowerCase().includes(search.toLowerCase())
  );

  return React.createElement("div", { className: "max-w-xl mx-auto p-6 min-h-screen" },

    React.createElement("h1", { className: "text-2xl font-bold uppercase tracking-wider mb-4" }, "Wine Bible"),

    isAdmin && React.createElement(
      "button",
      {
        onClick: () => setShowQR(true),
        className: "mb-6 px-4 py-2 bg-zinc-800 rounded-xl border border-zinc-700 text-sm uppercase"
      },
      "Show Wine QR"
    ),

    React.createElement("input", {
      type: "text",
      placeholder: "Search wines...",
      value: search,
      onChange: e => setSearch(e.target.value),
      className: "w-full p-3 mb-6"
    }),

    filtered.map((wine, index) =>
      React.createElement("div",
        { key: index, className: "mb-4 p-4 bg-zinc-900 rounded-xl border border-zinc-800" },
        React.createElement("h2", { className: "font-semibold" }, wine.name),
        React.createElement("p", { className: "text-sm text-zinc-400" }, wine.region + ", " + wine.country)
      )
    ),

    showQR && React.createElement(
      "div",
      { className: "fixed inset-0 bg-black/80 flex items-center justify-center p-6" },
      React.createElement(
        "div",
        { className: "bg-zinc-900 p-8 rounded-3xl text-center relative" },

        React.createElement(
          "button",
          {
            onClick: () => setShowQR(false),
            className: "absolute top-4 right-4 text-zinc-400 text-xl"
          },
          "×"
        ),

        React.createElement(
          "div",
          { className: "bg-white p-4 rounded-3xl mb-4" },
          React.createElement("img", { src: qrImg, className: "w-56 h-56" })
        ),

        React.createElement("h2", { className: "font-bold uppercase" }, "Wine Bible Access")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
