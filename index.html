<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Bible</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
    .card { background: #111; border: 1px solid #222; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    .tag { display: inline-block; font-size: 10px; letter-spacing: 0.12em; font-weight: 800; text-transform: uppercase; color: #fbbf24; }
    input { background: #0f0f0f !important; color: #fff !important; border-radius: 16px !important; border: 1px solid #222 !important; }
    input::placeholder { color: #9ca3af !important; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    // =========================
    // 1) MASTER WINE LIST (29)
    // =========================
    const WINES = [
      // Whites (10)
      { category:"White", name:"Esedra | Pinot Grigio", region:"Friuli, Italy", grapes:"Pinot Grigio", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Villa Maria | Sauvignon Blanc", region:"Marlborough, New Zealand", grapes:"Sauvignon Blanc", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"3XP | Chardonnay", region:"Niagara Peninsula, Canada", grapes:"Chardonnay", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Leaning Post | Riesling", region:"Niagara Peninsula, Canada", grapes:"Riesling", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Santa Margherita | Pinot Grigio", region:"Alto Adige, Italy", grapes:"Pinot Grigio", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Peller Estates | Pinot Gris", region:"Niagara Peninsula, Canada", grapes:"Pinot Gris", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Jean Marc Brocard | Chablis", region:"Chablis, France", grapes:"Chardonnay", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Domaine Hubert Brochard | Sancerre", region:"Sancerre, France", grapes:"Sauvignon Blanc", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Charles Baker, 'Picone Vineyard' | Riesling", region:"Niagara Peninsula, Canada", grapes:"Riesling", taste:"", guest:"", selling:"", service:"" },
      { category:"White", name:"Chateau de Maligny | Chablis 1er Cru", region:"Chablis, France", grapes:"Chardonnay", taste:"", guest:"", selling:"", service:"" },

      // Reds (15)
      { category:"Red", name:"Leyda Reserve | Pinot Noir", region:"Leyda Valley, Chile", grapes:"Pinot Noir", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Pago Aylés 'Unexpected' | Garnacha", region:"Aragón, Spain", grapes:"Garnacha", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Don David Reserve | Cabernet Sauvignon", region:"Calchaqui Valley, Argentina", grapes:"Cabernet Sauvignon", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Frescobaldi | Chianti Classico", region:"Tuscany, Italy", grapes:"Sangiovese (blend)", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Thirty Bench | Red Blend", region:"Niagara Peninsula, Canada", grapes:"Red blend", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Marques de Murrieta | Rioja Reserva", region:"Rioja, Spain", grapes:"Tempranillo (blend)", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Fontanafredda | Barolo", region:"Piedmont, Italy", grapes:"Nebbiolo", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Tomassi | Amarone della Valpolicella", region:"Veneto, Italy", grapes:"Corvina-led blend", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Frescobaldi | Brunello", region:"Tuscany, Italy", grapes:"Sangiovese", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Chateau la Croix | Bordeaux", region:"Bordeaux, France", grapes:"Bordeaux blend", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Chante Perdrix | Chateauneuf-du-Pape", region:"Rhône Valley, France", grapes:"Southern Rhône blend", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Ca' del Monte | Amarone", region:"Veneto, Italy", grapes:"Corvina-led blend", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Jean Baptiste Boudier | Savigny-les-Beaune", region:"Burgundy, France", grapes:"Pinot Noir", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Fuligni | Brunello di Montalcino", region:"Montalcino, Italy", grapes:"Sangiovese", taste:"", guest:"", selling:"", service:"" },
      { category:"Red", name:"Antinori | Tignanello", region:"Tuscany, Italy", grapes:"Sangiovese / Cab blend", taste:"", guest:"", selling:"", service:"" },

      // Sparkling & Rosé (4)
      { category:"Sparkling & Rosé", name:"Maison Nicolas Idiart | Cinsault", region:"Languedoc, France", grapes:"Cinsault", taste:"", guest:"", selling:"", service:"" },
      { category:"Sparkling & Rosé", name:"Bottega Vino dei Poeti | Prosecco", region:"Veneto, Italy", grapes:"Glera", taste:"", guest:"", selling:"", service:"" },
      { category:"Sparkling & Rosé", name:"Bottega Gold | Prosecco", region:"Veneto, Italy", grapes:"Glera", taste:"", guest:"", selling:"", service:"" },
      { category:"Sparkling & Rosé", name:"Piper-Heidsieck | Champagne", region:"Champagne, France", grapes:"Champagne blend", taste:"", guest:"", selling:"", service:"" }
    ];

    // =========================
    // 2) BTG NAMES (TOP SECTION)
    // =========================
    const BTG_NAMES = [
      "Esedra | Pinot Grigio",
      "Villa Maria | Sauvignon Blanc",
      "3XP | Chardonnay",
      "Leyda Reserve | Pinot Noir",
      "Pago Aylés 'Unexpected' | Garnacha",
      "Don David Reserve | Cabernet Sauvignon",
      "Bottega Vino dei Poeti | Prosecco"
    ];

    // =====================================
    // 3) DEDUPE (just in case future copy/paste)
    // =====================================
    const uniq = [];
    const seen = new Set();
    for (const w of WINES) {
      if (!seen.has(w.name)) { uniq.push(w); seen.add(w.name); }
    }

    // =========================
    // 4) APP
    // =========================
    function App() {
      const [search, setSearch] = React.useState("");
      const [openName, setOpenName] = React.useState(null);

      const s = search.toLowerCase().trim();

      const filtered = uniq.filter(w => {
        if (!s) return true;
        return (
          (w.name || "").toLowerCase().includes(s) ||
          (w.region || "").toLowerCase().includes(s) ||
          (w.grapes || "").toLowerCase().includes(s) ||
          (w.category || "").toLowerCase().includes(s)
        );
      });

      const btgFiltered = filtered.filter(w => BTG_NAMES.includes(w.name));
      const restFiltered = filtered.filter(w => !BTG_NAMES.includes(w.name));

      function renderWineCard(w) {
        const isOpen = openName === w.name;

        return React.createElement(
          "div",
          { key: w.name, className: "card p-5" },

          React.createElement(
            "button",
            {
              className: "w-full flex items-center justify-between text-left",
              onClick: () => setOpenName(isOpen ? null : w.name)
            },

            React.createElement(
              "div",
              null,
              React.createElement("div", { className: "tag" }, w.category),
              React.createElement("div", { className: "text-lg md:text-xl font-semibold mt-1" }, w.name),
              React.createElement("div", { className: "text-sm text-zinc-400 mt-1" }, `${w.region} • ${w.grapes}`)
            ),

            React.createElement("div", { className: "text-2xl text-zinc-500 leading-none pl-4" }, isOpen ? "–" : "+")
          ),

          isOpen && React.createElement(
            "div",
            { className: "mt-5 pt-5 border-t border-zinc-800 space-y-4 text-sm" },

            React.createElement("div", null,
              React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Taste"),
              React.createElement("div", { className: "text-zinc-100" }, w.taste || "—")
            ),

            React.createElement("div", null,
              React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Guest-friendly description"),
              React.createElement("div", { className: "text-zinc-100" }, w.guest || "—")
            ),

            React.createElement("div", null,
              React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Selling line"),
              React.createElement("div", { className: "text-zinc-100" }, w.selling || "—")
            ),

            React.createElement("div", null,
              React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Service note"),
              React.createElement("div", { className: "text-zinc-100" }, w.service || "—")
            )
          )
        );
      }

      return React.createElement(
        "div",
        { className: "max-w-3xl mx-auto p-4 pb-24" },

        React.createElement(
          "div",
          { className: "sticky top-0 bg-black pt-6 pb-4 z-10" },

          React.createElement("h1", { className: "text-3xl font-extrabold tracking-widest uppercase" }, "Wine Bible"),

          React.createElement("div", { className: "mt-4" },
            React.createElement("input", {
              type: "text",
              placeholder: `Search all ${uniq.length} wines...`,
              className: "w-full p-4 text-lg outline-none",
              value: search,
              onChange: (e) => { setSearch(e.target.value); setOpenName(null); }
            })
          )
        ),

        React.createElement("div", { className: "mt-6 space-y-6" },

          React.createElement("div", null,
            React.createElement("h2", { className: "text-xl font-bold tracking-widest uppercase text-amber-400 mb-3" }, "By The Glass"),
            btgFiltered.length
              ? React.createElement("div", { className: "space-y-4" }, btgFiltered.map(renderWineCard))
              : React.createElement("div", { className: "text-zinc-500 text-sm" }, "No BTG matches your search.")
          ),

          React.createElement("div", null,
            React.createElement("h2", { className: "text-xl font-bold tracking-widest uppercase text-zinc-400 mb-3 mt-8" }, "Full List"),
            restFiltered.length
              ? React.createElement("div", { className: "space-y-4" }, restFiltered.map(renderWineCard))
              : React.createElement("div", { className: "text-zinc-500 text-sm" }, "No matches.")
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
